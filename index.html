<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOSYSTEM SIMULATION - 생태계 시뮬레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 캔버스 컨테이너 스타일 */
        .canvas-container {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 3/2;
            background: radial-gradient(circle, #14532d 0%, #064e3b 100%);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #10b981;
            cursor: pointer;
            border: 2px solid white;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 flex flex-col items-center justify-center">

    <div class="max-w-[1600px] w-full flex flex-col xl:flex-row gap-8">
        
        <!-- 시뮬레이션 영역 -->
        <div class="flex-1 flex flex-col items-center w-full">
            <div class="flex flex-col items-center mb-6">
                <h1 class="text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 italic">ECOSYSTEM SIMULATION</h1>
                <p class="text-slate-400 text-sm mt-2 uppercase tracking-widest font-bold">Natural Selection Simulator</p>
            </div>
            
            <!-- 캔버스 래퍼 -->
            <div class="canvas-container w-full">
                <canvas id="simCanvas"></canvas>
            </div>
        </div>

        <!-- 컨트롤 패널 -->
        <div class="w-full xl:w-96 bg-slate-900/80 backdrop-blur-2xl p-8 rounded-[2.5rem] shadow-2xl border border-white/5 flex flex-col gap-8 shrink-0">
            <div>
                <h2 class="text-2xl font-bold mb-6 text-emerald-400 border-b border-white/10 pb-4 flex justify-between items-center">
                    실시간 상태
                    <span id="timeDisplay" class="text-xs font-mono text-emerald-500/70 px-3 py-1 bg-emerald-500/10 rounded-full">GEN 0</span>
                </h2>
                <div class="space-y-3">
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                        <span class="flex items-center gap-3 font-semibold text-emerald-400">🌿 수풀</span>
                        <span id="grassCount" class="font-mono text-2xl font-bold text-emerald-400">0</span>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                        <span class="flex items-center gap-3 font-semibold text-yellow-400">🦌 사슴</span>
                        <span id="deerCount" class="font-mono text-2xl font-bold text-yellow-400">0</span>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                        <span class="flex items-center gap-3 font-semibold text-orange-500">🐆 표범</span>
                        <span id="leopardCount" class="font-mono text-2xl font-bold text-orange-500">0</span>
                    </div>
                    <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                        <span class="flex items-center gap-3 font-semibold text-pink-400">🪱 지렁이</span>
                        <span id="earthwormCount" class="font-mono text-2xl font-bold text-pink-400">0</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="toggleBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg active:scale-95">일시정지</button>
                <button id="resetBtn" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-2xl transition-all active:scale-95">초기화</button>
            </div>

            <div class="space-y-6 pt-4 border-t border-white/10">
                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-widest">환경 설정</h3>
                
                <div class="space-y-5">
                    <div class="space-y-3">
                        <div class="flex justify-between text-xs font-bold px-1">
                            <span class="text-slate-400 uppercase">수풀 성장 속도</span>
                            <span id="val-grassRate" class="text-emerald-400 font-mono">3</span>
                        </div>
                        <input type="range" id="grassRate" min="1" max="10" value="3" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div class="space-y-3">
                        <div class="flex justify-between text-xs font-bold px-1">
                            <span class="text-slate-400 uppercase">사슴 초기 수</span>
                            <span id="val-initDeers" class="text-yellow-400 font-mono">40</span>
                        </div>
                        <input type="range" id="initDeers" min="5" max="150" value="40" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div class="space-y-3">
                        <div class="flex justify-between text-xs font-bold px-1">
                            <span class="text-slate-400 uppercase">표범 초기 수</span>
                            <span id="val-initLeopards" class="text-orange-500 font-mono">4</span>
                        </div>
                        <input type="range" id="initLeopards" min="0" max="30" value="4" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div class="space-y-3">
                        <div class="flex justify-between text-xs font-bold px-1">
                            <span class="text-slate-400 uppercase">지렁이 초기 수</span>
                            <span id="val-initWorms" class="text-pink-400 font-mono">15</span>
                        </div>
                        <input type="range" id="initWorms" min="0" max="50" value="15" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const grassCountEl = document.getElementById('grassCount');
    const deerCountEl = document.getElementById('deerCount');
    const leopardCountEl = document.getElementById('leopardCount');
    const wormCountEl = document.getElementById('earthwormCount');
    const timeDisplay = document.getElementById('timeDisplay');
    const toggleBtn = document.getElementById('toggleBtn');
    const resetBtn = document.getElementById('resetBtn');

    // Controls
    const grassRateInput = document.getElementById('grassRate');
    const initDeersInput = document.getElementById('initDeers');
    const initLeopardsInput = document.getElementById('initLeopards');
    const initWormsInput = document.getElementById('initWorms');

    // State
    let isRunning = true;
    let generation = 0;
    let frames = 0;
    let entities = { grass: [], deers: [], leopards: [], worms: [], carcasses: [] };

    // 화면 크기에 맞게 캔버스 해상도 조절
    function resizeCanvas() {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }

    window.addEventListener('resize', resizeCanvas);

    class Organism {
        constructor(x, y, emoji, energy = 100) {
            this.x = x || Math.random() * canvas.width;
            this.y = y || Math.random() * canvas.height;
            this.emoji = emoji;
            this.energy = energy;
            this.angle = Math.random() * Math.PI * 2;
            
            if (emoji === '🐆') this.size = 38;
            else if (emoji === '🦌') this.size = 30;
            else this.size = 22;
        }

        update(speedMult) {
            this.angle += (Math.random() - 0.5) * 0.4;
            this.x += Math.cos(this.angle) * speedMult;
            this.y += Math.sin(this.angle) * speedMult;

            if (this.x < 30 || this.x > canvas.width - 30) this.angle = Math.PI - this.angle;
            if (this.y < 30 || this.y > canvas.height - 30) this.angle = -this.angle;
            
            this.x = Math.max(20, Math.min(canvas.width - 20, this.x));
            this.y = Math.max(20, Math.min(canvas.height - 20, this.y));
            
            this.energy -= 0.15;
        }

        draw() {
            ctx.font = `${this.size}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.globalAlpha = Math.max(0.3, this.energy / 100);
            ctx.fillText(this.emoji, this.x, this.y);
            ctx.globalAlpha = 1.0;
        }
    }

    function init() {
        resizeCanvas(); // 초기화 시 캔버스 크기 맞춤
        generation = 0;
        frames = 0;
        entities = { grass: [], deers: [], leopards: [], worms: [], carcasses: [] };
        
        const dCount = parseInt(initDeersInput.value);
        const lCount = parseInt(initLeopardsInput.value);
        const wCount = parseInt(initWormsInput.value);

        for (let i = 0; i < 60; i++) entities.grass.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height});
        for (let i = 0; i < dCount; i++) entities.deers.push(new Organism(null, null, '🦌'));
        for (let i = 0; i < lCount; i++) entities.leopards.push(new Organism(null, null, '🐆', 150));
        for (let i = 0; i < wCount; i++) entities.worms.push(new Organism(null, null, '🪱'));
    }

    function updateSim() {
        if (!isRunning) return;

        frames++;
        if (frames % 60 === 0) generation++;

        // 1. Grass
        if (Math.random() < (parseInt(grassRateInput.value) * 0.02)) {
            entities.grass.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height});
        }

        // 2. Deer
        for (let i = entities.deers.length - 1; i >= 0; i--) {
            let d = entities.deers[i];
            d.update(2.0);
            
            for (let j = entities.grass.length - 1; j >= 0; j--) {
                if (Math.hypot(d.x - entities.grass[j].x, d.y - entities.grass[j].y) < 30) {
                    entities.grass.splice(j, 1);
                    d.energy += 35;
                    break;
                }
            }
            if (d.energy > 180) { d.energy = 90; entities.deers.push(new Organism(d.x, d.y, '🦌', 90)); }
            if (d.energy <= 0) { entities.carcasses.push({x: d.x, y: d.y, t: 500}); entities.deers.splice(i, 1); }
        }

        // 3. Leopard
        for (let i = entities.leopards.length - 1; i >= 0; i--) {
            let l = entities.leopards[i];
            l.update(3.2);
            
            for (let j = entities.deers.length - 1; j >= 0; j--) {
                if (Math.hypot(l.x - entities.deers[j].x, l.y - entities.deers[j].y) < 40) {
                    entities.deers.splice(j, 1);
                    l.energy += 90;
                    break;
                }
            }
            if (l.energy > 280) { l.energy = 140; entities.leopards.push(new Organism(l.x, l.y, '🐆', 140)); }
            if (l.energy <= 0) { entities.carcasses.push({x: l.x, y: l.y, t: 500}); entities.leopards.splice(i, 1); }
        }

        // 4. Worm
        for (let i = entities.worms.length - 1; i >= 0; i--) {
            let w = entities.worms[i];
            w.update(0.8);
            
            for (let j = entities.carcasses.length - 1; j >= 0; j--) {
                let c = entities.carcasses[j];
                if (Math.hypot(w.x - c.x, w.y - c.y) < 30) {
                    w.energy += 8;
                    c.t -= 10;
                    if (Math.random() < 0.1) {
                        entities.grass.push({x: c.x + (Math.random()-0.5)*60, y: c.y + (Math.random()-0.5)*60});
                    }
                }
            }
            if (w.energy > 150) { w.energy = 75; entities.worms.push(new Organism(w.x, w.y, '🪱')); }
            if (w.energy <= 0) entities.worms.splice(i, 1);
        }

        entities.carcasses = entities.carcasses.filter(c => {
            c.t--;
            return c.t > 0;
        });
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        entities.carcasses.forEach(c => {
            ctx.save();
            ctx.globalAlpha = c.t / 500;
            ctx.font = '24px serif';
            ctx.textAlign = 'center';
            ctx.fillText('🦴', c.x, c.y);
            ctx.restore();
        });

        ctx.font = '20px serif';
        ctx.textAlign = 'center';
        entities.grass.forEach(g => ctx.fillText('🌿', g.x, g.y));

        entities.worms.forEach(w => w.draw());
        entities.deers.forEach(d => d.draw());
        entities.leopards.forEach(l => l.draw());

        timeDisplay.innerText = `GEN ${generation}`;
        grassCountEl.innerText = entities.grass.length;
        deerCountEl.innerText = entities.deers.length;
        leopardCountEl.innerText = entities.leopards.length;
        wormCountEl.innerText = entities.worms.length;

        updateSim();
        requestAnimationFrame(render);
    }

    const inputs = [
        { el: grassRateInput, valEl: document.getElementById('val-grassRate') },
        { el: initDeersInput, valEl: document.getElementById('val-initDeers') },
        { el: initLeopardsInput, valEl: document.getElementById('val-initLeopards') },
        { el: initWormsInput, valEl: document.getElementById('val-initWorms') }
    ];
    
    inputs.forEach(item => {
        item.el.oninput = () => item.valEl.innerText = item.el.value;
    });

    toggleBtn.onclick = () => {
        isRunning = !isRunning;
        toggleBtn.innerText = isRunning ? '일시정지' : '시작';
        if(isRunning) {
            toggleBtn.className = "bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg active:scale-95";
        } else {
            toggleBtn.className = "bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg active:scale-95";
        }
    };

    resetBtn.onclick = init;

    // 페이지 로드 후 실행
    window.onload = () => {
        init();
        render();
    };
</script>
</body>
</html>
